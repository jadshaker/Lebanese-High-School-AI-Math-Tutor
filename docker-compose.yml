services:
  # App - FastAPI application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: math-tutor-app
    ports:
      - '8000:8000'
    env_file:
      - .env
      - path: .env.dev
        required: false
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload --no-access-log
    volumes:
      - ./.logs:/app/logs
    networks:
      - math-tutor-network

  # Math Atelier - Custom React frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: math-tutor-ui
    ports:
      - '3000:80'
    depends_on:
      - app
    networks:
      - math-tutor-network
    restart: unless-stopped

  # Caddy - Reverse proxy + automatic HTTPS (Let's Encrypt)
  caddy:
    image: caddy:2-alpine
    container_name: math-tutor-caddy
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - frontend
    networks:
      - math-tutor-network
    restart: unless-stopped

  # Prometheus - Metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: math-tutor-prometheus
    ports:
      - '9090:9090'
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - math-tutor-network
    restart: unless-stopped

  # Grafana - Metrics visualization
  grafana:
    image: grafana/grafana:latest
    container_name: math-tutor-grafana
    ports:
      - '3001:3000'
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - prometheus
    networks:
      - math-tutor-network
    restart: unless-stopped

networks:
  math-tutor-network:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  caddy-data:
  caddy-config:
