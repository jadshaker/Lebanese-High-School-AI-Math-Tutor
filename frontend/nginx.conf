server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy API calls to the FastAPI backend
    location /v1/ {
        proxy_pass http://app:8000/v1/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 120s;
    }

    location /tutoring {
        proxy_pass http://app:8000/tutoring;
        proxy_set_header Host $host;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass http://app:8000/health;
        proxy_set_header Host $host;
    }

    location /metrics {
        proxy_pass http://app:8000/metrics;
        proxy_set_header Host $host;
    }

    location /logs/ {
        proxy_pass http://app:8000/logs/;
        proxy_set_header Host $host;
    }

    location /track/ {
        proxy_pass http://app:8000/track/;
        proxy_set_header Host $host;
    }

    # Graph endpoints including WebSocket upgrade
    location /graph/ {
        proxy_pass http://app:8000/graph/;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # SPA fallback — all unknown routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
