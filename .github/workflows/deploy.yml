name: Deploy to VPS

on:
  push:
    branches:
      - host-online

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/Lebanese-High-School-AI-Math-Tutor
            git pull origin host-online
            docker compose up -d --build
